# .github/workflows/update-videos.yml
# ─────────────────────────────────────────────────────────────────
# The Antigle — YouTube Auto-Updater
#
# Runs every day at 6:00 AM IST (00:30 UTC).
# Also runs manually from Actions tab.
# First push to main bhi trigger karega.
# ─────────────────────────────────────────────────────────────────

name: Update YouTube Videos

on:
  schedule:
    - cron: "30 0 * * *"   # 6:00 AM IST daily

  workflow_dispatch:         # Manual trigger from GitHub Actions tab

  push:
    branches:
      - main                 # Run on first push too

permissions:
  contents: write            # Needed to commit back

jobs:
  update-videos:
    name: Fetch YouTube Videos & Update JSON
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run fetch script
        run: python scripts/fetch_videos.py

      - name: Check if JSON changed
        id: diff
        run: |
          if git diff --quiet content/videos/index.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push new videos
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/videos/index.json
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          git commit -m "chore: auto-update videos [$TIMESTAMP]"
          git push

      - name: No new videos
        if: steps.diff.outputs.changed == 'false'
        run: echo "No changes — nothing to commit."
